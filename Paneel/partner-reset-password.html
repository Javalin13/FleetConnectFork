<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>NH - Wachtwoord instellen</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 2rem; border-radius: 16px; width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; }
        button { width: 100%; padding: 10px; background: #2dd4bf; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; }
    </style>
</head>
<body>
<div class="box">
    <h2>Nieuw wachtwoord instellen</h2>
    <input type="password" id="pw1" placeholder="Nieuw wachtwoord (min. 6)">
    <input type="password" id="pw2" placeholder="Bevestig wachtwoord">
    <button id="saveBtn">Wachtwoord opslaan</button>
    <div id="msg" class="error"></div>
</div>
<script>
    const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MTA';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const access_token = params.get('access_token');

    if (!access_token) {
        document.getElementById('msg').innerText = 'Ongeldige link. Vraag een nieuwe reset aan.';
        throw new Error('Geen token');
    }

    // Gebruik verifyOtp om sessie te krijgen
    supabase.auth.verifyOtp({ token: access_token, type: 'recovery' }).then(() => {
        document.getElementById('msg').innerHTML = '<span class="success">✅ Sessie actief. Je kunt nu een nieuw wachtwoord instellen.</span>';
        document.getElementById('saveBtn').disabled = false;
    }).catch(err => {
        document.getElementById('msg').innerText = 'Fout: ' + err.message;
    });

    document.getElementById('saveBtn').addEventListener('click', async () => {
        const p1 = document.getElementById('pw1').value;
        const p2 = document.getElementById('pw2').value;
        if (!p1 || !p2) { document.getElementById('msg').innerText = 'Vul beide velden in.'; return; }
        if (p1 !== p2) { document.getElementById('msg').innerText = 'Wachtwoorden komen niet overeen.'; return; }
        if (p1.length < 6) { document.getElementById('msg').innerText = 'Minimaal 6 tekens.'; return; }

        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerText = 'Bezig...';

        const { error } = await supabase.auth.updateUser({ password: p1 });
        if (error) {
            document.getElementById('msg').innerText = 'Fout: ' + error.message;
            btn.disabled = false;
            btn.innerText = 'Wachtwoord opslaan';
        } else {
            document.getElementById('msg').innerHTML = '<span class="success">✅ Wachtwoord gewijzigd! Je wordt doorgestuurd...</span>';
            await supabase.auth.signOut();
            setTimeout(() => { window.location.href = 'partner-login.html'; }, 2000);
        }
    });
</script>
</body>
</html>
