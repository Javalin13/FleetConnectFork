<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>NH - Wachtwoord instellen</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 2rem; border-radius: 16px; width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; }
        button { width: 100%; padding: 10px; background: #2dd4bf; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 12px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error { color: red; margin-top: 12px; }
        .success { color: green; }
        .info { color: blue; }
        pre { background: #f4f4f4; padding: 8px; text-align: left; font-size: 12px; overflow-x: auto; }
    </style>
</head>
<body>
<div class="box">
    <h2>Nieuw wachtwoord instellen</h2>
    <input type="password" id="pw1" placeholder="Nieuw wachtwoord (min. 6 tekens)">
    <input type="password" id="pw2" placeholder="Bevestig wachtwoord">
    <button id="saveBtn" disabled>Wachtwoord opslaan</button>
    <div id="msg"></div>
    <details>
        <summary>🔧 Technische debug (klik om te openen)</summary>
        <pre id="debugInfo"></pre>
    </details>
</div>
<script>
    const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MTA';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const msgDiv = document.getElementById('msg');
    const saveBtn = document.getElementById('saveBtn');
    const debugPre = document.getElementById('debugInfo');

    // Toon alle URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const params = {};
    for (let [k, v] of urlParams.entries()) params[k] = v;
    debugPre.innerText = `Volledige URL: ${window.location.href}\nParameters: ${JSON.stringify(params, null, 2)}`;

    // Haal mogelijke tokens op
    let token_hash = urlParams.get('token_hash');
    let type = urlParams.get('type');
    let code = urlParams.get('code');  // fallback

    async function verifyAndEnable() {
        if (token_hash && type) {
            // Moderne methode met token_hash
            msgDiv.innerHTML = '<span class="info">🔐 Verifiëren met token_hash...</span>';
            try {
                const { data, error } = await supabase.auth.verifyOtp({ token_hash, type });
                if (error) throw error;
                if (data.session) {
                    msgDiv.innerHTML = '<span class="success">✅ Sessie actief! Je kunt nu je wachtwoord wijzigen.</span>';
                    saveBtn.disabled = false;
                } else {
                    throw new Error('Geen sessie ontvangen');
                }
            } catch (err) {
                msgDiv.innerHTML = `<span class="error">❌ Fout: ${err.message}</span>`;
                debugPre.innerText += `\n\nverifyOtp fout: ${err.message}`;
            }
        } 
        else if (code) {
            // Fallback voor oude links met ?code=
            msgDiv.innerHTML = '<span class="info">🔐 Oude linkstijl gedetecteerd (code) – probeer exchangeCodeForSession...</span>';
            try {
                const { data, error } = await supabase.auth.exchangeCodeForSession(code);
                if (error) throw error;
                if (data.session) {
                    msgDiv.innerHTML = '<span class="success">✅ Sessie actief via code! Je kunt nu je wachtwoord wijzigen.</span>';
                    saveBtn.disabled = false;
                } else {
                    throw new Error('Geen sessie');
                }
            } catch (err) {
                msgDiv.innerHTML = `<span class="error">❌ Fout met code: ${err.message}. Vraag een nieuwe link aan (na het updaten van je e-mail template).</span>`;
                debugPre.innerText += `\n\nexchangeCodeForSession fout: ${err.message}`;
            }
        }
        else {
            msgDiv.innerHTML = '<span class="error">❌ Geen geldige resetparameter gevonden (geen token_hash en geen code).<br>Controleer of je e‑mailtemplate in Supabase is aangepast naar de versie met token_hash.</span>';
        }
    }

    verifyAndEnable();

    // Wachtwoord opslaan (zelfde als voorheen)
    saveBtn.addEventListener('click', async () => {
        const p1 = document.getElementById('pw1').value;
        const p2 = document.getElementById('pw2').value;
        if (!p1 || !p2) { msgDiv.innerHTML = '<span class="error">Vul alle velden in.</span>'; return; }
        if (p1 !== p2) { msgDiv.innerHTML = '<span class="error">Wachtwoorden komen niet overeen.</span>'; return; }
        if (p1.length < 6) { msgDiv.innerHTML = '<span class="error">Minimaal 6 tekens.</span>'; return; }

        saveBtn.disabled = true;
        saveBtn.innerText = 'Bezig...';

        const { error } = await supabase.auth.updateUser({ password: p1 });
        if (error) {
            msgDiv.innerHTML = `<span class="error">Fout bij updaten: ${error.message}</span>`;
            saveBtn.disabled = false;
            saveBtn.innerText = 'Wachtwoord opslaan';
        } else {
            msgDiv.innerHTML = '<span class="success">✅ Wachtwoord gewijzigd! Je wordt doorgestuurd...</span>';
            await supabase.auth.signOut();
            setTimeout(() => { window.location.href = 'partner-login.html'; }, 2000);
        }
    });
</script>
</body>
</html>
