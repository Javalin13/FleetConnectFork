<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>NH - Wachtwoord herstellen</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; background: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 20px; border-radius: 16px; width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2dd4bf; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
<div class="box">
    <h2>Nieuw wachtwoord instellen</h2>
    <input type="password" id="pw1" placeholder="Nieuw wachtwoord">
    <input type="password" id="pw2" placeholder="Bevestig wachtwoord">
    <button id="saveBtn">Wachtwoord opslaan</button>
    <div id="msg"></div>
</div>
<script>
    const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MATA';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const saveBtn = document.getElementById('saveBtn');
    const msgDiv = document.getElementById('msg');
    
    // KNOP IS DIRECT ACTIEF - GEEN VERIFICATIE NODIG
    saveBtn.disabled = false;
    
    saveBtn.onclick = async () => {
        const p1 = document.getElementById('pw1').value;
        const p2 = document.getElementById('pw2').value;
        
        if (!p1 || !p2) {
            msgDiv.innerHTML = '<span class="error">Vul alle velden in</span>';
            return;
        }
        if (p1 !== p2) {
            msgDiv.innerHTML = '<span class="error">Wachtwoorden komen niet overeen</span>';
            return;
        }
        if (p1.length < 6) {
            msgDiv.innerHTML = '<span class="error">Minimaal 6 tekens</span>';
            return;
        }
        
        saveBtn.disabled = true;
        saveBtn.innerText = 'Bezig...';
        
        // Haal token uit URL
        const hash = window.location.hash;
        const urlParams = new URLSearchParams(window.location.search);
        let token = urlParams.get('token_hash') || urlParams.get('code');
        
        if (!token && hash) {
            const hashParams = new URLSearchParams(hash.substring(1));
            token = hashParams.get('access_token');
        }
        
        if (token) {
            // Probeer sessie op te bouwen met token
            const { error } = await supabase.auth.setSession({
                access_token: token,
                refresh_token: token
            });
            
            if (!error) {
                const { error: updateError } = await supabase.auth.updateUser({ password: p1 });
                if (updateError) {
                    msgDiv.innerHTML = `<span class="error">Fout: ${updateError.message}</span>`;
                    saveBtn.disabled = false;
                    saveBtn.innerText = 'Wachtwoord opslaan';
                } else {
                    msgDiv.innerHTML = '<span class="success">✅ Wachtwoord gewijzigd!</span>';
                    setTimeout(() => window.location.href = 'partner-login.html', 2000);
                }
            } else {
                msgDiv.innerHTML = `<span class="error">Fout: ${error.message}</span>`;
                saveBtn.disabled = false;
                saveBtn.innerText = 'Wachtwoord opslaan';
            }
        } else {
            msgDiv.innerHTML = '<span class="error">Geen geldige token gevonden in URL</span>';
            saveBtn.disabled = false;
            saveBtn.innerText = 'Wachtwoord opslaan';
        }
    };
</script>
</body>
</html>
