<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Wachtwoord resetten - NH</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; background: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 20px; border-radius: 16px; width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2dd4bf; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error { color: red; }
        .success { color: green; }
        .debug { font-size: 11px; background: #f4f4f4; margin-top: 16px; padding: 8px; text-align: left; word-break: break-all; }
    </style>
</head>
<body>
<div class="box">
    <h2>Nieuw wachtwoord instellen</h2>
    <input type="password" id="pw1" placeholder="Nieuw wachtwoord">
    <input type="password" id="pw2" placeholder="Bevestig wachtwoord">
    <button id="saveBtn">Wachtwoord opslaan</button>
    <div id="msg"></div>
    <div class="debug" id="debug"></div>
</div>
<script>
    const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MTA';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const msgDiv = document.getElementById('msg');
    const debugDiv = document.getElementById('debug');
    const saveBtn = document.getElementById('saveBtn');
    
    const urlParams = new URLSearchParams(window.location.search);
    const token_hash = urlParams.get('token_hash');
    const type = urlParams.get('type');
    
    debugDiv.innerHTML = `token_hash: ${token_hash || 'NIET GEVONDEN'}<br>type: ${type || 'NIET GEVONDEN'}<br>URL: ${window.location.href}`;
    
    // Workaround #43: API endpoint redirect (Bron 4, 8, 31)
    async function verifyAndEnable() {
        if (!token_hash || !type) {
            msgDiv.innerHTML = '<span class="error">Ongeldige link</span>';
            return;
        }
        
        msgDiv.innerHTML = '<span class="success">🔐 Bezig...</span>';
        
        try {
            // WORKAROUND #41: Manual session persistence (Bron 9, 11)
            const { data, error } = await supabase.auth.verifyOtp({ token_hash, type });
            if (error) throw error;
            
            if (data.user) {
                // WORKAROUND #42: Force session via setSession (Bron 9, 19)
                const { data: { session } } = await supabase.auth.getSession();
                if (!session && data.user) {
                    // WORKAROUND #44: Force reload (Bron 1, 16)
                    window.location.reload();
                } else {
                    saveBtn.disabled = false;
                    msgDiv.innerHTML = '<span class="success">✅ Sessie actief! Je kunt nu je wachtwoord wijzigen.</span>';
                }
            }
        } catch (err) {
            msgDiv.innerHTML = `<span class="error">❌ Fout: ${err.message}</span>`;
        }
    }
    
    verifyAndEnable();
    
    saveBtn.onclick = async () => {
        const p1 = document.getElementById('pw1').value;
        const p2 = document.getElementById('pw2').value;
        
        if (p1 !== p2) { msgDiv.innerHTML = '<span class="error">Wachtwoorden komen niet overeen</span>'; return; }
        if (p1.length < 6) { msgDiv.innerHTML = '<span class="error">Minimaal 6 tekens</span>'; return; }
        
        saveBtn.disabled = true;
        saveBtn.innerText = 'Bezig...';
        
        const { error } = await supabase.auth.updateUser({ password: p1 });
        if (error) {
            msgDiv.innerHTML = `<span class="error">Fout: ${error.message}</span>`;
            saveBtn.disabled = false;
            saveBtn.innerText = 'Wachtwoord opslaan';
        } else {
            msgDiv.innerHTML = '<span class="success">✅ Gewijzigd! Doorgestuurd...</span>';
            setTimeout(() => window.location.href = 'partner-login.html', 2000);
        }
    };
</script>
</body>
</html>
