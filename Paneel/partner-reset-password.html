<script>
    const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MTA';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const msgDiv = document.getElementById('msg');
    const saveBtn = document.getElementById('saveBtn');
    let sessionReady = false;

    // 1. Controleer of er een geldige sessie is (via de fragment-token)
    async function checkSession() {
        const { data: { session }, error } = await supabase.auth.getSession();
        if (error) {
            msgDiv.innerText = 'Fout bij ophalen sessie: ' + error.message;
            return false;
        }
        if (session) {
            msgDiv.innerHTML = '<span class="success">✅ Sessie actief. Je kunt nu een nieuw wachtwoord instellen.</span>';
            return true;
        } else {
            // Wacht op auth state change (voor het geval de sessie net wordt gezet)
            return new Promise((resolve) => {
                const { data: listener } = supabase.auth.onAuthStateChange((event, session) => {
                    if (event === 'SIGNED_IN' && session) {
                        listener?.unsubscribe();
                        msgDiv.innerHTML = '<span class="success">✅ Sessie actief. Je kunt nu een nieuw wachtwoord instellen.</span>';
                        resolve(true);
                    }
                });
                // Timeout na 5 seconden
                setTimeout(() => {
                    listener?.unsubscribe();
                    if (!sessionReady) {
                        msgDiv.innerText = 'Geen geldige resetlink gevonden. Vraag een nieuwe aan.';
                        resolve(false);
                    }
                }, 5000);
            });
        }
    }

    // 2. Wanneer de sessie klaar is, schakel de knop in
    checkSession().then(ready => {
        if (ready) {
            saveBtn.disabled = false;
            sessionReady = true;
        }
    });

    // 3. Wachtwoord opslaan
    saveBtn.addEventListener('click', async () => {
        if (!sessionReady) {
            msgDiv.innerText = 'Sessie is niet actief. Vraag een nieuwe resetlink aan.';
            return;
        }

        const p1 = document.getElementById('pw1').value;
        const p2 = document.getElementById('pw2').value;
        if (!p1 || !p2) {
            msgDiv.innerText = 'Vul alle velden in.';
            return;
        }
        if (p1 !== p2) {
            msgDiv.innerText = 'Wachtwoorden komen niet overeen.';
            return;
        }
        if (p1.length < 6) {
            msgDiv.innerText = 'Minimaal 6 tekens.';
            return;
        }

        saveBtn.disabled = true;
        saveBtn.innerText = 'Bezig...';

        const { error } = await supabase.auth.updateUser({ password: p1 });
        if (error) {
            msgDiv.innerText = 'Fout: ' + error.message;
            saveBtn.disabled = false;
            saveBtn.innerText = 'Wachtwoord opslaan';
        } else {
            msgDiv.innerHTML = '<span class="success">✅ Wachtwoord gewijzigd! Je wordt doorgestuurd...</span>';
            await supabase.auth.signOut();
            setTimeout(() => { window.location.href = 'partner-login.html'; }, 2000);
        }
    });
</script>
