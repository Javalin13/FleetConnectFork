<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>NH - Wachtwoord reset debug</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: monospace; background: #f4f7fc; padding: 2rem; max-width: 800px; margin: 0 auto; }
        pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 12px; overflow-x: auto; }
        .success { color: #166534; background: #dcfce7; padding: 1rem; border-radius: 12px; margin: 1rem 0; }
        .error { color: #b91c1c; background: #fee2e2; padding: 1rem; border-radius: 12px; margin: 1rem 0; }
        input, button { display: block; width: 100%; margin: 1rem 0; padding: 0.8rem; font-size: 1rem; }
        button { background: #2dd4bf; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<h2>🔐 Wachtwoord reset debugger</h2>
<div id="debug"></div>
<input type="password" id="pw1" placeholder="Nieuw wachtwoord (min 6 tekens)">
<input type="password" id="pw2" placeholder="Bevestig wachtwoord">
<button id="saveBtn">Wachtwoord opslaan</button>

<script>
    const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MTA';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const debugDiv = document.getElementById('debug');
    function log(msg, isError = false) {
        const p = document.createElement('div');
        p.textContent = msg;
        p.className = isError ? 'error' : 'success';
        p.style.margin = '0.5rem 0';
        debugDiv.appendChild(p);
        console.log(msg);
    }

    async function init() {
        log('📌 Resetpagina geladen');
        const hash = window.location.hash.substring(1);
        log(`📌 Hash uit URL: "${hash}"`);
        const params = new URLSearchParams(hash);
        const access_token = params.get('access_token');
        const refresh_token = params.get('refresh_token');
        const type = params.get('type');
        log(`📌 access_token aanwezig? ${!!access_token}`);
        log(`📌 refresh_token aanwezig? ${!!refresh_token}`);
        log(`📌 type = ${type}`);

        if (!access_token) {
            log('❌ Geen access_token gevonden. De link is ongeldig.', true);
            document.getElementById('saveBtn').disabled = true;
            return;
        }

        log('🔄 Sessie wordt hersteld met setSession...');
        const { error: setError } = await supabase.auth.setSession({
            access_token,
            refresh_token
        });
        if (setError) {
            log(`❌ setSession mislukt: ${setError.message}`, true);
            document.getElementById('saveBtn').disabled = true;
            return;
        }
        log('✅ setSession gelukt');

        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            log('❌ Geen actieve sessie na setSession', true);
            document.getElementById('saveBtn').disabled = true;
            return;
        }
        log(`✅ Sessie actief voor gebruiker: ${session.user.email}`);
        log(`🔓 Knop wordt ingeschakeld`);
        document.getElementById('saveBtn').disabled = false;
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
        const p1 = document.getElementById('pw1').value;
        const p2 = document.getElementById('pw2').value;
        if (!p1 || !p2) {
            log('❌ Vul alle velden in', true);
            return;
        }
        if (p1 !== p2) {
            log('❌ Wachtwoorden komen niet overeen', true);
            return;
        }
        if (p1.length < 6) {
            log('❌ Minimaal 6 tekens', true);
            return;
        }

        log('⏳ Wachtwoord wordt opgeslagen...');
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        const { error } = await supabase.auth.updateUser({ password: p1 });
        if (error) {
            log(`❌ Fout bij opslaan: ${error.message}`, true);
            btn.disabled = false;
        } else {
            log('✅ Wachtwoord succesvol gewijzigd! Doorgestuurd naar login...');
            await supabase.auth.signOut();
            setTimeout(() => {
                window.location.href = 'partner-login.html';
            }, 2000);
        }
    });

    init();
</script>
</body>
</html>
