<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>NH - Wachtwoord herstellen</title>
    <!-- Gebruik een stabiele Supabase versie -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
    <style>
        body { font-family: Arial; background: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 20px; border-radius: 16px; width: 400px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2dd4bf; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; margin-top: 10px; }
        .info { color: blue; margin-top: 10px; }
        .log { background: #f4f4f4; padding: 10px; font-size: 12px; text-align: left; margin-top: 16px; word-break: break-all; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="box">
    <h2>Nieuw wachtwoord instellen</h2>
    <input type="password" id="password" placeholder="Nieuw wachtwoord (min. 6 tekens)">
    <input type="password" id="confirmPassword" placeholder="Bevestig wachtwoord">
    <button id="saveBtn">Wachtwoord opslaan</button>
    <div id="message"></div>
    <div class="log" id="log"></div>
</div>
<script>
    // ================= JOUW API GEGEVENS =================
    // Controleer of deze EXACT overeenkomen met je Supabase Dashboard!
    const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MATA';
    // =====================================================

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const saveBtn = document.getElementById('saveBtn');
    const msgDiv = document.getElementById('message');
    const logDiv = document.getElementById('log');

    function addLog(message, isError = false) {
        const logEntry = document.createElement('div');
        logEntry.textContent = new Date().toLocaleTimeString() + ' - ' + message;
        logEntry.style.color = isError ? 'red' : 'black';
        logDiv.appendChild(logEntry);
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(message);
    }

    addLog('✅ Pagina geladen. API URL: ' + SUPABASE_URL);
    addLog('🔑 API Key begint met: ' + SUPABASE_ANON_KEY.substring(0, 15) + '...');

    // --- 1. Lees token uit de URL ---
    const urlParams = new URLSearchParams(window.location.search);
    let token = urlParams.get('token_hash') || urlParams.get('code');
    addLog(`🔍 Gevonden token in URL: ${token ? 'JA (' + token.substring(0, 20) + '...)' : 'NEE'}`);

    if (!token) {
        msgDiv.innerHTML = '<span class="error">❌ Geen geldige resetlink gevonden.</span>';
        saveBtn.disabled = true;
        addLog('❌ Geen token, knop uitgezet.', true);
    } else {
        // --- 2. Sessie herstellen met de token ---
        addLog('🔄 Stap 1: Sessie herstellen met setSession()...');
        supabase.auth.setSession({
            access_token: token,
            refresh_token: token
        }).then(({ data, error }) => {
            if (error) {
                addLog(`❌ FOUT bij setSession: ${error.message}`, true);
                msgDiv.innerHTML = `<span class="error">❌ Fout bij inloggen: ${error.message}</span>`;
                saveBtn.disabled = true;
                return;
            }
            addLog('✅ Stap 1 GELUKT! Sessie hersteld.');
            msgDiv.innerHTML = '<span class="success">✅ Sessie actief! Je kunt nu je wachtwoord wijzigen.</span>';
            saveBtn.disabled = false;
            saveBtn.style.cursor = 'pointer';
        });
    }

    // --- 3. Wachtwoord opslaan (deze knop wordt actief na succesvolle stap 1)---
    saveBtn.onclick = async () => {
        const newPassword = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // Validatie
        if (!newPassword || !confirmPassword) {
            msgDiv.innerHTML = '<span class="error">⚠️ Vul alle velden in</span>';
            return;
        }
        if (newPassword !== confirmPassword) {
            msgDiv.innerHTML = '<span class="error">⚠️ Wachtwoorden komen niet overeen</span>';
            return;
        }
        if (newPassword.length < 6) {
            msgDiv.innerHTML = '<span class="error">⚠️ Wachtwoord moet minimaal 6 tekens bevatten</span>';
            return;
        }

        // Start API call
        addLog('🔄 Stap 2: updateUser() wordt aangeroepen...');
        saveBtn.disabled = true;
        saveBtn.innerText = 'Bezig...';
        msgDiv.innerHTML = '<span class="info">🔄 Wachtwoord wordt gewijzigd...</span>';

        const { error } = await supabase.auth.updateUser({ password: newPassword });

        if (error) {
            addLog(`❌ FOUT bij updateUser: ${error.message}`, true);
            msgDiv.innerHTML = `<span class="error">❌ Fout bij wijzigen: ${error.message}</span>`;
            saveBtn.disabled = false;
            saveBtn.innerText = 'Wachtwoord opslaan';
        } else {
            addLog('✅✅✅ SUCCES! Wachtwoord is gewijzigd! ✅✅✅');
            msgDiv.innerHTML = '<span class="success">✅ Wachtwoord succesvol gewijzigd! Je wordt doorgestuurd...</span>';
            await supabase.auth.signOut();
            setTimeout(() => {
                window.location.href = 'partner-login.html';
            }, 3000);
        }
    };
</script>
</body>
</html>
